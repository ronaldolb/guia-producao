<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia de Produção & Demanda</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161921;
  --bg3: #1e2230;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8eaf0;
  --muted: #7a8099;
  --accent: #4f9eff;
  --accent2: #7c6fff;
  --green: #3ecf8e;
  --amber: #f5a623;
  --coral: #ff6b6b;
  --purple: #9b8cff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; min-height: 100vh; }

/* HEADER */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; gap: 16px; height: 56px; position: sticky; top: 0; z-index: 100; }
.logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: .06em; white-space: nowrap; }
.search-wrap { flex: 1; max-width: 480px; position: relative; }
.search-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px 8px 36px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border .2s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.badge-count { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 56px); }

/* SIDEBAR */
.sidebar { width: 220px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); padding: 16px 0; position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto; }
.sidebar-section { padding: 0 12px 16px; }
.sidebar-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }
.nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border-radius: 7px; border: none; background: transparent; color: var(--muted); font-family: var(--sans); font-size: 13px; cursor: pointer; transition: all .15s; text-align: left; }
.nav-btn:hover { background: var(--bg3); color: var(--text); }
.nav-btn.active { background: rgba(79,158,255,0.12); color: var(--accent); }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* MAIN */
.main { flex: 1; padding: 28px 28px 60px; max-width: 860px; }

/* SECTION HEADER */
.sec-header { margin-bottom: 24px; }
.sec-tag { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
.sec-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.sec-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }

/* CARDS GRID */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-bottom: 28px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px; cursor: pointer; transition: all .2s; }
.card:hover { border-color: var(--border2); transform: translateY(-1px); }
.card.expanded { border-color: var(--border2); }
.card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.card-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.card-meta { flex: 1; }
.card-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.card-sub { font-size: 12px; color: var(--muted); }
.card-preview { font-size: 13px; color: var(--muted); line-height: 1.6; }
.card-expand { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px; display: none; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: translateY(0); } }
.card-expand.open { display: block; }

/* DETAIL LIST */
.detail-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.detail-list li { font-size: 13px; color: var(--muted); display: flex; gap: 8px; line-height: 1.5; }
.detail-list li::before { content: '›'; color: var(--accent); flex-shrink: 0; font-weight: 600; }

/* FORMULA */
.formula { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: var(--mono); font-size: 12px; color: var(--green); margin: 12px 0; }

/* TAGS */
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.tag { font-size: 11px; font-family: var(--mono); padding: 3px 9px; border-radius: 4px; background: var(--bg3); border: 1px solid var(--border); color: var(--muted); }

/* STEP LIST */
.step-list { display: flex; flex-direction: column; gap: 0; }
.step-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.step-item:last-child { border-bottom: none; }
.step-num { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--accent); min-width: 24px; padding-top: 2px; }
.step-body .step-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.step-body .step-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* COMPARE TABLE */
.compare-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 16px; }
.compare-table th, .compare-table td { padding: 9px 12px; border: 1px solid var(--border); text-align: left; }
.compare-table th { background: var(--bg3); color: var(--muted); font-family: var(--mono); font-weight: 500; font-size: 11px; letter-spacing: .04em; }
.compare-table td { color: var(--muted); }
.compare-table tr:hover td { background: var(--bg3); }

/* SEARCH RESULTS */
.search-results { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
.result-item { padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.result-item:last-child { border-bottom: none; }
.result-item:hover .result-name { color: var(--accent); }
.result-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; transition: color .15s; }
.result-path { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.result-snippet { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.no-results { color: var(--muted); font-size: 14px; text-align: center; padding: 20px 0; }

/* MOBILE */
.mob-nav-toggle { display: none; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 6px 10px; cursor: pointer; font-size: 18px; }
.sidebar-overlay { display: none; }
@media (max-width: 700px) {
  .mob-nav-toggle { display: flex; }
  .sidebar { position: fixed; left: -240px; top: 56px; height: calc(100vh - 56px); z-index: 200; transition: left .25s; width: 220px; }
  .sidebar.open { left: 0; }
  .sidebar-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .sidebar-overlay.open { opacity: 1; pointer-events: all; }
  .main { padding: 20px 16px 60px; }
  .cards-grid { grid-template-columns: 1fr; }
  .badge-count { display: none; }
}

/* HIGHLIGHT */
mark { background: rgba(79,158,255,0.25); color: var(--accent); border-radius: 2px; padding: 0 2px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── TABELA PERIÓDICA DE LOGÍSTICA ── */
.periodic-wrap { width: 100%; overflow-x: auto; padding-bottom: 8px; }
.periodic-table { display: grid; grid-template-columns: repeat(8, minmax(80px, 1fr)); gap: 8px; min-width: 680px; }
.pt-cell { border-radius: 10px; padding: 10px 8px 8px; cursor: pointer; position: relative; transition: transform .15s, box-shadow .15s; user-select: none; border: 2px solid transparent; }
.pt-cell:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
.pt-cell:active { transform: scale(.97); }
.pt-cell.selected { border-color: rgba(255,255,255,.5); box-shadow: 0 0 0 3px rgba(255,255,255,.15); }
.pt-num { font-family: var(--mono); font-size: 10px; font-weight: 500; opacity: .7; margin-bottom: 4px; }
.pt-sig { font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 4px; letter-spacing: -.02em; }
.pt-name { font-size: 9px; font-weight: 600; line-height: 1.2; margin-bottom: 3px; opacity: .95; }
.pt-desc { font-size: 8px; opacity: .7; line-height: 1.3; }
.pt-empty { background: transparent !important; cursor: default; }
.pt-empty:hover { transform: none; box-shadow: none; }
/* cores por grupo */
.pt-g1 { background: #6c3fc5; color: #fff; }
.pt-g2 { background: #2563a8; color: #fff; }
.pt-g3 { background: #1a7a4a; color: #fff; }
.pt-g4 { background: #c45c1a; color: #fff; }
.pt-g5 { background: #b02080; color: #fff; }
.pt-g6 { background: #b5891a; color: #fff; }
.pt-g7 { background: #1a8a8a; color: #fff; }
/* legend */
.pt-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.pt-leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.pt-leg-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
/* detail modal */
.pt-detail { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 20px; margin-top: 20px; animation: fadeIn .2s ease; }
.pt-detail-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 14px; }
.pt-detail-badge { width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; flex-shrink: 0; }
.pt-detail-meta { flex: 1; }
.pt-detail-num { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.pt-detail-name { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.pt-detail-group { font-size: 12px; color: var(--muted); }
.pt-detail-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
.pt-detail-list li { font-size: 13px; color: var(--muted); display: flex; gap: 8px; line-height: 1.5; }
.pt-detail-list li::before { content: "›"; color: var(--accent); font-weight: 600; flex-shrink: 0; }
.pt-hint { font-size: 12px; color: var(--muted); text-align: center; margin-bottom: 14px; opacity: .6; }
@media (max-width: 700px) {
  .pt-sig { font-size: 18px; }
  .pt-name { font-size: 8px; }
  .pt-desc { display: none; }
  .periodic-table { gap: 5px; min-width: 560px; }
  .pt-cell { padding: 8px 5px 6px; }
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<header class="header">
  <button class="mob-nav-toggle" onclick="toggleSidebar()">☰</button>
  <div class="logo">PROD&gt;GUIDE</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Buscar: OEE, MAPE, S&OP, PDCA…" oninput="doSearch(this.value)">
  </div>
  <div class="badge-count" id="badge-count">7 módulos · 100+ conceitos</div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Módulos</div>
      <button class="nav-btn active" onclick="showSection('ppcp')" id="nav-ppcp">
        <span class="nav-dot" style="background:#4f9eff"></span> PPCP
      </button>
      <button class="nav-btn" onclick="showSection('pdca')" id="nav-pdca">
        <span class="nav-dot" style="background:#3ecf8e"></span> PDCA
      </button>
      <button class="nav-btn" onclick="showSection('demanda')" id="nav-demanda">
        <span class="nav-dot" style="background:#f5a623"></span> Previsão de demanda
      </button>
      <button class="nav-btn" onclick="showSection('controle')" id="nav-controle">
        <span class="nav-dot" style="background:#9b8cff"></span> Controle da demanda
      </button>
      <button class="nav-btn" onclick="showSection('kpis')" id="nav-kpis">
        <span class="nav-dot" style="background:#ff6b6b"></span> KPIs
      </button>
      <button class="nav-btn" onclick="showSection('ml')" id="nav-ml">
        <span class="nav-dot" style="background:#7c6fff"></span> Machine Learning
      </button>
      <button class="nav-btn" onclick="showSection('logistica')" id="nav-logistica">
        <span class="nav-dot" style="background:#00b4a0"></span> Logística
      </button>
    </div>
  </nav>

  <main class="main" id="main-content">
    <!-- conteúdo dinâmico -->
  </main>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const sections = {

ppcp: {
  tag: 'Planejamento · Programação · Controle',
  title: 'PPCP — Programação e Controle da Produção',
  desc: 'O PPCP integra as três grandes fases da gestão de produção: planejar o que produzir, acompanhar o andamento e controlar os desvios em relação ao programado.',
  groups: [
    {
      label: 'Programação da produção',
      color: '#4f9eff',
      items: [
        { name: 'Previsão de demanda', sub: 'Ponto de partida', preview: 'Estima o que será consumido para dimensionar produção, materiais e capacidade.', detail: ['Alimenta o MRP, planejamento de capacidade e gestão de estoques', 'Horizonte curto (dias/semanas): reposição de estoque operacional', 'Horizonte médio (meses): programação da produção e compras', 'Horizonte longo (anos): investimentos e capacidade instalada', 'Nunca é exata — o erro deve ser monitorado e reduzido continuamente'], tags: ['MRP', 'Capacidade', 'Estoques'] },
        { name: 'MRP / Planejamento', sub: 'Materials Requirement Planning', preview: 'Calcula necessidades de materiais, capacidade e prazo com base na demanda prevista.', detail: ['Explode a demanda independente em necessidades dependentes (componentes)', 'Considera lead times, estoques disponíveis e ordens em aberto', 'Gera ordens de produção e ordens de compra planejadas', 'Base para o APS (Advanced Planning & Scheduling) em sistemas modernos'], tags: ['BOM', 'Lead time', 'Ordens planejadas'] },
        { name: 'Sequenciamento', sub: 'Fila de máquinas e prioridades', preview: 'Define a ordem de execução das ordens nas máquinas para minimizar setup e atrasos.', detail: ['Regras de prioridade: FIFO, EDD (menor prazo), SPT (menor tempo de processo)', 'Minimiza o makespan (tempo total de produção do lote)', 'Considera setups dependentes de sequência — ex.: cor clara antes de escura', 'Ferramentas: gráfico de Gantt, APS, algoritmos heurísticos'], tags: ['FIFO', 'Makespan', 'Setup'] },
        { name: 'Programação detalhada', sub: 'Gráfico de Gantt / Schedule', preview: 'Aloca cada operação em tempo e máquina, gerando o cronograma detalhado da produção.', detail: ['Gráfico de Gantt: visualização da alocação de tarefas por máquina e tempo', 'Considera capacidade finita de cada recurso', 'Saída: data de início e término de cada operação', 'Alimenta o apontamento e o acompanhamento da produção'], tags: ['Gantt', 'Capacidade finita', 'Cronograma'] },
      ]
    },
    {
      label: 'Acompanhamento da produção',

        { name: 'Monitoramento em tempo real', sub: 'Indicadores e dashboards', preview: 'Acompanha o andamento da produção vs. o programado em tempo real.', detail: ['OEE em tempo real: disponibilidade × desempenho × qualidade', 'Andon: sinal visual/sonoro de parada — chama ação imediata', 'Dashboard de produção: produção acumulada vs. meta do turno', 'Integração MES → ERP para atualização automática das ordens'], tags: ['Andon', 'Dashboard', 'Tempo real'] },
        { name: 'Registro de ocorrências', sub: 'Paradas e desvios', preview: 'Documenta paradas, rejeitos e eventos não planejados para análise de causa raiz.', detail: ['Classificação de paradas: planejada, manutenção, falta de material, setup, falha', 'Registro de rejeitos por tipo de defeito — alimenta SPC e análise de qualidade', 'Relatório de turno: síntese dos eventos para o gestor e turno seguinte', 'Base para o plano de ação corretivo e melhoria contínua'], tags: ['Paradas', 'Rejeitos', 'SPC'] },

      ]
    }

},

pdca: {

      label: 'As quatro fases',
      color: '#3ecf8e',

        { name: 'D — Do (Executar)', sub: 'Implementar em escala piloto', preview: 'Coloca o plano em prática em pequena escala e coleta dados reais.', detail: ['Treinar a equipe envolvida nas mudanças antes de executar', 'Executar o plano em escala piloto — nunca na operação toda de primeira', 'Coletar dados reais durante a execução: medir tudo que foi definido no Plan', 'Registrar desvios, dificuldades e resultados observados sem alterar o plano', 'Documentar as condições exatas da execução para reproducibilidade'], tags: ['Piloto', 'Coleta de dados', 'Treinamento'] },

demanda: {
  tag: 'Previsão · Métodos · Erros',
  title: 'Previsão de Demanda',
  desc: 'Base de todo planejamento de produção e estoques. A previsão estima a demanda futura com base em dados históricos, mercado e variáveis externas.',
  groups: [
    {
      label: 'Métodos qualitativos',
      color: '#f5a623',
      items: [
        { name: 'Método Delphi', sub: 'Consenso de especialistas', preview: 'Consulta iterativa a especialistas para obter previsões quando há poucos dados históricos.', detail: ['Usado para novos produtos, mercados emergentes ou cenários de ruptura', 'Rodadas anônimas de questionários evitam viés de grupo e efeito manada', 'Especialistas revisam as respostas dos demais e ajustam suas previsões', 'Convergência após 3–5 rodadas gera o forecast consensual', 'Limitação: caro, lento e dependente da qualidade dos especialistas'], tags: ['Novo produto', 'Qualitativo', 'Consenso'] },
        { name: 'Pesquisa de mercado', sub: 'Intenção de compra do consumidor', preview: 'Coleta dados diretamente do mercado sobre intenção de compra e preferências.', detail: ['Surveys com amostra representativa do mercado-alvo', 'Útil para lançamentos e para capturar mudanças de comportamento do consumidor', 'Limitação: o que o consumidor diz que vai fazer ≠ o que ele faz', 'Complementa métodos quantitativos — não substitui dados históricos', 'Custo elevado — usar com seletividade'], tags: ['Survey', 'Consumidor', 'Lançamento'] },
      ]
    },
    {
      label: 'Métodos quantitativos',
      color: '#3ecf8e',
      items: [
        { name: 'Média móvel simples', sub: 'Média dos N períodos anteriores', preview: 'Calcula a média dos últimos N períodos como previsão do próximo.', detail: ['Simples de calcular e entender — boa para demanda estável sem tendência', 'N pequeno: reage rápido a mudanças mas é mais sensível a ruído', 'N grande: suaviza ruído mas reage lento a mudanças reais de nível', 'Não captura tendência nem sazonalidade', 'Ponto de partida antes de métodos mais sofisticados'], formula: 'F(t+1) = [D(t) + D(t-1) + ... + D(t-N+1)] / N', tags: ['Demanda estável', 'Simples', 'Baseline'] },
        { name: 'Suavização exponencial', sub: 'Holt-Winters com sazonalidade', preview: 'Pesa mais os dados recentes — captura nível, tendência e sazonalidade.', detail: ['Simples (SES): só nível — parâmetro α (0 a 1) controla a reatividade', 'Holt (Double): nível + tendência — dois parâmetros α e β', 'Holt-Winters (Triple): nível + tendência + sazonalidade — três parâmetros α, β, γ', 'α alto → reage rápido a mudanças; α baixo → mais suave e estável', 'Estado da arte para séries com sazonalidade clara sem usar ML'], formula: 'F(t+1) = α × D(t) + (1-α) × F(t)', tags: ['Sazonalidade', 'Tendência', 'α β γ'] },
        { name: 'Regressão linear', sub: 'Demanda como função de variáveis', preview: 'Relaciona a demanda a variáveis causais como preço, temperatura ou PIB.', detail: ['Identifica quanto cada variável explica a variação da demanda', 'Variáveis comuns: preço próprio, preço do concorrente, temperatura, renda, publicidade', 'R² mede o quanto o modelo explica a variação da demanda (0 a 1)', 'Pressupõe relação linear — usar regressão múltipla para vários fatores', 'Cuidado com multicolinearidade entre variáveis independentes'], formula: 'Demanda = a + b₁×Preço + b₂×Temp + ... + ε', tags: ['Causal', 'R²', 'Variáveis externas'] },
        { name: 'SARIMA / SARIMAX', sub: 'Séries temporais com sazonalidade', preview: 'Modelo clássico que captura autocorrelação, tendência e sazonalidade.', detail: ['ARIMA: AutoRegressive Integrated Moving Average — para séries estacionárias', 'SARIMA: adiciona componente sazonal (p,d,q)(P,D,Q)s', 'SARIMAX: inclui variáveis exógenas (preço, promoção)', 'Interpretável e auditável — importante em contextos regulados', 'auto_arima (biblioteca pmdarima) automatiza a seleção de parâmetros'], formula: 'SARIMA(p,d,q)(P,D,Q)s', tags: ['Estacionariedade', 'ACF', 'PACF'] },
      ]
    },
    {
      label: 'Métricas de erro',
      color: '#ff6b6b',
      items: [
        { name: 'MAPE', sub: 'Mean Absolute Percentage Error', preview: 'Erro percentual médio — permite comparar produtos de volumes diferentes.', detail: ['< 10%: excelente · 10–20%: aceitável · > 20%: crítico — necessita revisão', 'Vantagem: interpretável em % — fácil de comunicar à gestão', 'Limitação: explode quando o real é próximo de zero (divisão por zero)', 'sMAPE (simétrico) resolve o problema de assimetria do MAPE clássico'], formula: 'MAPE = (1/n) × Σ |Real − Prev| / Real × 100%', tags: ['% erro', 'Comparável', 'KPI forecast'] },
        { name: 'Bias (viés)', sub: 'Superestimação ou subestimação sistemática', preview: 'Detecta se o modelo erra consistentemente para cima ou para baixo.', detail: ['Bias positivo (+): modelo superestima → causa excesso de estoque', 'Bias negativo (−): modelo subestima → causa rupturas e perda de venda', 'Um modelo pode ter MAPE aceitável mas bias alto — os dois precisam ser monitorados', 'Tracking signal = Σ erro / MAD — detecta quando o bias é estatisticamente significativo', 'Causas comuns: sazonalidade não capturada, mudança de tendência, promoção não modelada'], formula: 'Bias = Σ (Previsto − Real) / Σ Real × 100%', tags: ['Overforecast', 'Underforecast', 'Tracking signal'] },
        { name: 'MAD', sub: 'Mean Absolute Deviation', preview: 'Média dos erros absolutos — base para calcular o estoque de segurança.', detail: ['Mede o erro médio em unidades absolutas — fácil de entender operacionalmente', 'Usado para dimensionar estoque de segurança: SS = z × MAD × √LT', 'Não é afetado por erros positivos e negativos que se cancelam (ao contrário do bias)', 'MAD ≈ 0,8 × RMSE para distribuições normais'], formula: 'MAD = (1/n) × Σ |Real − Previsto|', tags: ['Estoque segurança', 'Unidades', 'Operacional'] },
      ]
    }
  ]
},

kpis: {

    }
  ]

      cells += `<div class="pt-cell pt-g${e.group}" id="ptcell-${e.num}" onclick="selectElement(${e.num})">
        <div class="pt-num">${e.num}</div>
        <div class="pt-sig">${e.sig}</div>
        <div class="pt-name">${e.name}</div>
        <div class="pt-desc">${e.desc}</div>
      </div>`;
    }
  }

  main.innerHTML = `
    <div class="sec-header">
      <div class="sec-tag">Logística · 7 Grupos · 23 Elementos</div>
      <div class="sec-title">Tabela Periódica da Logística</div>
      <div class="sec-desc">Os 23 elementos essenciais para uma logística padronizada e eficiente. Toque em qualquer elemento para ver a explicação completa.</div>
    </div>
    <div class="pt-legend">${legend}</div>
    <div class="pt-hint">▼ Toque em um elemento para ver os detalhes</div>
    <div class="periodic-wrap">
      <div class="periodic-table">${cells}</div>
    </div>
    <div id="pt-detail-box"></div>
  `;
}

function selectElement(num) {
  const e = logElements.find(x => x.num === num);
  if (!e) return;

  // toggle
  if (selectedElement === num) {
    selectedElement = null;
    document.querySelectorAll('.pt-cell').forEach(c => c.classList.remove('selected'));
    document.getElementById('pt-detail-box').innerHTML = '';
    return;
  }
  selectedElement = num;
  document.querySelectorAll('.pt-cell').forEach(c => c.classList.remove('selected'));
  const cell = document.getElementById('ptcell-' + num);
  if (cell) { cell.classList.add('selected'); cell.scrollIntoView({behavior:'smooth', block:'nearest'}); }

  const color = groupColors[e.group];
  const items = e.detail.map(d => `<li>${d}</li>`).join('');
  document.getElementById('pt-detail-box').innerHTML = `
    <div class="pt-detail">
      <div class="pt-detail-top">
        <div class="pt-detail-badge" style="background:${color}">${e.sig}</div>
        <div class="pt-detail-meta">
          <div class="pt-detail-num">Elemento ${e.num}</div>
          <div class="pt-detail-name">${e.name}</div>
          <div class="pt-detail-group">Grupo ${e.group} — ${groupNames[e.group]}</div>
        </div>
      </div>
      <ul class="pt-detail-list">${items}</ul>
    </div>
  `;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentSection = 'ppcp';
let expandedCards = new Set();
let searchQuery = '';

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main-content');
  if (searchQuery.length > 1) {
    renderSearch(main);
  } else {
    renderSection(main, currentSection);
  }
}

function renderSection(main, secId) {
  if (secId === 'logistica') { renderLogistica(main); return; }
  const sec = sections[secId];
  let html = `
    <div class="sec-header">
      <div class="sec-tag">${sec.tag}</div>
      <div class="sec-title">${sec.title}</div>
      <div class="sec-desc">${sec.desc}</div>
    </div>
  `;
  sec.groups.forEach((group, gi) => {
    html += `<div style="margin-bottom:28px">
      <div style="font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${group.color};flex-shrink:0"></span>
        ${group.label}
      </div>
      <div class="cards-grid">`;
    group.items.forEach((item, ii) => {
      const cardId = `${secId}-${gi}-${ii}`;
      const isOpen = expandedCards.has(cardId);
      const tagsHtml = item.tags ? `<div class="tags" onclick="event.stopPropagation()">${item.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : '';
      const formulaHtml = item.formula ? `<div class="formula" onclick="event.stopPropagation()">${item.formula}</div>` : '';
      const detailHtml = item.detail ? `<ul class="detail-list">${item.detail.map(d=>`<li>${d}</li>`).join('')}</ul>` : '';
      html += `
        <div class="card ${isOpen?'expanded':''}" id="card-${cardId}" onclick="toggleCard('${cardId}', event)">
          <div class="card-top">
            <div class="card-icon" style="background:${group.color}18;color:${group.color}">
              ${getIcon(item.name)}
            </div>
            <div class="card-meta">
              <div class="card-name">${item.name}</div>
              <div class="card-sub">${item.sub}</div>
            </div>
            <div class="card-arrow" style="color:var(--muted);font-size:11px;transition:transform .25s;flex-shrink:0;margin-left:auto;padding-left:8px">▼</div>
          </div>
          <div class="card-preview">${item.preview}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:4px"><span style="opacity:.5">toque para</span> <span style="color:var(--accent);opacity:.7">${expandedCards.has(cardId)?"fechar":"ver detalhes"}</span></div>
          <div class="card-expand ${isOpen?'open':''}">
            ${detailHtml}
            ${formulaHtml}
            ${tagsHtml}
          </div>
        </div>`;
    });
    html += `</div></div>`;
  });
  main.innerHTML = html;
}

function renderSearch(main) {
  const q = searchQuery.toLowerCase();
  const results = searchIndex.filter(item =>
    item.name.toLowerCase().includes(q) ||
    item.sub.toLowerCase().includes(q) ||
    item.preview.toLowerCase().includes(q) ||
    item.detail.toLowerCase().includes(q) ||
    item.tags.toLowerCase().includes(q) ||
    item.formula.toLowerCase().includes(q)
  );

  let html = `<div class="sec-header">
    <div class="sec-tag">Busca</div>
    <div class="sec-title">${results.length} resultado${results.length!==1?'s':''} para "${searchQuery}"</div>
  </div>`;

  if (results.length === 0) {
    html += `<div class="search-results"><div class="no-results">Nenhum resultado encontrado. Tente: OEE, MAPE, S&OP, PDCA, XGBoost…</div></div>`;
  } else {
    html += `<div class="search-results">`;
    results.forEach(r => {
      const snip = highlight(r.preview, q);
      html += `<div class="result-item" onclick="goToSection('${r.secId}')">
        <div class="result-name">${highlight(r.name, q)}</div>
        <div class="result-path">${r.secTitle} › ${r.groupLabel}</div>
        <div class="result-snippet">${snip}</div>
      </div>`;
    });
    html += `</div>`;
  }
  main.innerHTML = html;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function showSection(secId) {
  currentSection = secId;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  expandedCards.clear();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navEl = document.getElementById('nav-' + secId);
  if (navEl) navEl.classList.add('active');
  closeSidebar();
  render();
  window.scrollTo(0, 0);
}

function goToSection(secId) {
  showSection(secId);
}

function toggleCard(cardId, event) {
  if (event) event.stopPropagation();
  if (expandedCards.has(cardId)) expandedCards.delete(cardId);
  else expandedCards.add(cardId);
  const card = document.getElementById('card-' + cardId);
  const expand = card.querySelector('.card-expand');
  const arrow = card.querySelector('.card-arrow');
  const isOpen = expandedCards.has(cardId);
  card.classList.toggle('expanded', isOpen);
  expand.classList.toggle('open', isOpen);
  if (arrow) arrow.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
}

function doSearch(val) {
  searchQuery = val.trim();
  expandedCards.clear();
  render();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
function getIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('oee') || n.includes('efici')) return '⚙';
  if (n.includes('forecast') || n.includes('previsão') || n.includes('mape') || n.includes('mad') || n.includes('bias') || n.includes('fill') || n.includes('acurácia')) return '📈';
  if (n.includes('pdca') || n.includes('plan') || n.includes('planejar')) return '🔄';
  if (n.includes('do') || n.includes('executar')) return '▶';
  if (n.includes('check') || n.includes('verif')) return '✓';
  if (n.includes('act') || n.includes('agir') || n.includes('padron')) return '★';
  if (n.includes('ishikawa') || n.includes('causa')) return '🐟';
  if (n.includes('pareto')) return '📊';
  if (n.includes('5w2h') || n.includes('plano de ação')) return '📋';
  if (n.includes('porquê') || n.includes('5 por')) return '❓';
  if (n.includes('otif')) return '🚚';
  if (n.includes('lead time')) return '⏱';
  if (n.includes('produtiv')) return '👷';
  if (n.includes('estoque') || n.includes('giro') || n.includes('cobertura') || n.includes('inventário')) return '📦';
  if (n.includes('rejeição') || n.includes('scrap') || n.includes('fty') || n.includes('qualidade')) return '🔍';
  if (n.includes('custo') || n.includes('margem') || n.includes('ebitda') || n.includes('giro de ativo')) return '💰';
  if (n.includes('s&op')) return '🤝';
  if (n.includes('cpfr')) return '🔗';
  if (n.includes('demand sensing') || n.includes('sensing')) return '📡';
  if (n.includes('comparativo') || n.includes('vs.')) return '⚖';
  if (n.includes('mrp') || n.includes('planejamento')) return '🗂';
  if (n.includes('sequenciamento')) return '🔢';
  if (n.includes('programação detalhada') || n.includes('gantt')) return '📅';
  if (n.includes('coleta') || n.includes('apontamento')) return '📝';
  if (n.includes('monitoramento') || n.includes('tempo real')) return '🖥';
  if (n.includes('registro') || n.includes('ocorrência')) return '🗒';
  if (n.includes('desvio') || n.includes('análise de des')) return '📉';
  if (n.includes('corretiv') || n.includes('replanejamento')) return '🔧';
  if (n.includes('relatório') || n.includes('kpi')) return '📋';
  if (n.includes('supervisionado')) return '🎯';
  if (n.includes('não supervis')) return '🔮';
  if (n.includes('reforço')) return '🏆';
  if (n.includes('deep') || n.includes('lstm') || n.includes('neural')) return '🧠';
  if (n.includes('xgboost') || n.includes('lightgbm') || n.includes('gradient')) return '🚀';
  if (n.includes('prophet')) return '🔭';
  if (n.includes('random forest')) return '🌲';
  if (n.includes('transformer') || n.includes('tft')) return '⚡';
  if (n.includes('demand forecasting')) return '📈';
  if (n.includes('manutenção preditiva')) return '🔩';
  if (n.includes('visão computacional')) return '👁';
  if (n.includes('otimização de estoque')) return '📦';
  if (n.includes('coleta e integração')) return '🗄';
  if (n.includes('feature')) return '🔬';
  if (n.includes('validação') || n.includes('walk-forward')) return '✅';
  if (n.includes('deploy') || n.includes('mlops')) return '🖧';
  if (n.includes('média móvel')) return '〰';
  if (n.includes('suavização') || n.includes('exponencial')) return '📈';
  if (n.includes('regressão')) return '📐';
  if (n.includes('arima') || n.includes('sarima')) return '〜';
  if (n.includes('delphi')) return '💬';
  if (n.includes('pesquisa')) return '🔎';
  return '◆';
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
