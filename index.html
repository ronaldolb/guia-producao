<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROD·GUIDE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--bg2:#161921;--bg3:#1e2230;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);
  --text:#e8eaf0;--muted:#7a8099;--dim:#4a5068;
  --accent:#4f9eff;--green:#3ecf8e;--amber:#f5a623;
  --coral:#ff6b6b;--purple:#9b8cff;--teal:#00b4a0;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:54px;position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.06em;white-space:nowrap}
.sw{flex:1;max-width:460px;position:relative}
.sw input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .2s}
.sw input:focus{border-color:var(--accent)}
.sw input::placeholder{color:var(--muted)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.bc{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.mob-tog{display:none;background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:5px 9px;cursor:pointer;font-size:17px}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 54px)}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:14px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.sl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:0 18px;margin-bottom:6px}
.nb{display:flex;align-items:center;gap:9px;width:100%;padding:7px 10px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .15s;text-align:left}
.nb:hover{background:var(--bg3);color:var(--text)}
.nb.active{background:rgba(79,158,255,.12);color:var(--accent)}
.nd{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main{flex:1;padding:24px 24px 60px;max-width:880px}

/* SECTION HEADER */
.sh{margin-bottom:22px}
.st{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.stt{font-size:22px;font-weight:600;color:var(--text);margin-bottom:5px}
.sd{font-size:14px;color:var(--muted);line-height:1.7}

/* CARDS GRID */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:12px;margin-bottom:26px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.ct{display:flex;align-items:flex-start;gap:11px;margin-bottom:9px}
.ci{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cm{flex:1}
.cn{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1px}
.cs{font-size:11px;color:var(--muted)}
.ca{color:var(--muted);font-size:11px;transition:transform .25s;flex-shrink:0;margin-left:auto;padding-left:6px}
.cp{font-size:13px;color:var(--muted);line-height:1.6}
.hint{font-size:11px;color:var(--muted);margin-top:6px;opacity:.5}
.ce{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:none;animation:fi .2s ease}
.ce.open{display:block}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}

/* DETAIL LIST */
.dl{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.dl li{font-size:13px;color:var(--muted);display:flex;gap:7px;line-height:1.5}
.dl li::before{content:'›';color:var(--accent);flex-shrink:0;font-weight:600}

/* FORMULA */
.fml{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-family:var(--mono);font-size:12px;color:var(--green);margin:10px 0}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.tag{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}

/* CROSS REF */
.xref{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.xref-btn{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--accent);color:var(--accent);background:transparent;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.xref-btn:hover{background:rgba(79,158,255,.1)}

/* GROUP LABEL */
.gl{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.gd{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* SEARCH */
.sr{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:22px}
.ri{padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ri:last-child{border-bottom:none}
.ri:hover .rn{color:var(--accent)}
.rn{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1px;transition:color .15s}
.rp{font-family:var(--mono);font-size:11px;color:var(--muted)}
.rs{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.ne{color:var(--muted);font-size:14px;text-align:center;padding:20px 0}
mark{background:rgba(79,158,255,.22);color:var(--accent);border-radius:2px;padding:0 2px}

/* PERIODIC TABLE */
.pw{width:100%;overflow-x:auto;padding-bottom:8px}
.pt{display:grid;grid-template-columns:repeat(8,minmax(78px,1fr));gap:7px;min-width:660px}
.pc{border-radius:10px;padding:9px 7px 7px;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s;user-select:none;border:2px solid transparent}
.pc:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.4)}
.pc.sel{border-color:rgba(255,255,255,.5);box-shadow:0 0 0 3px rgba(255,255,255,.12)}
.pe{background:transparent!important;cursor:default}
.pe:hover{transform:none;box-shadow:none}
.pn{font-family:var(--mono);font-size:10px;font-weight:500;opacity:.65;margin-bottom:3px}
.ps{font-size:21px;font-weight:700;line-height:1;margin-bottom:3px}
.pm{font-size:9px;font-weight:600;line-height:1.2;margin-bottom:2px}
.pd{font-size:8px;opacity:.65;line-height:1.3}
.ptleg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.pli{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.pld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.ptd{background:var(--bg2);border:1px solid var(--border2);border-radius:13px;padding:18px;margin-top:18px;animation:fi .2s ease}
.ptd-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.ptd-badge{width:52px;height:52px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.ptd-num{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:1px}
.ptd-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:1px}
.ptd-grp{font-size:12px;color:var(--muted)}
.pthint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:12px;opacity:.55}

/* MOBILE */
.sob{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
@media(max-width:680px){
  .mob-tog{display:flex}
  .sidebar{position:fixed;left:-220px;top:54px;height:calc(100vh - 54px);z-index:200;transition:left .25s;width:210px}
  .sidebar.open{left:0}
  .sob{display:block;opacity:0;pointer-events:none;transition:opacity .25s}
  .sob.open{opacity:1;pointer-events:all}
  .main{padding:18px 14px 60px}
  .cg{grid-template-columns:1fr}
  .bc{display:none}
  .ps{font-size:17px}
  .pd{display:none}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>
<div class="sob" id="sob" onclick="closeSb()"></div>
<header class="hdr">
  <button class="mob-tog" onclick="togSb()">☰</button>
  <div class="logo">PROD·GUIDE</div>
  <div class="sw"><span class="si">🔍</span><input type="text" id="sinput" placeholder="Buscar: OEE, OTIF, WMS, PDCA…" oninput="doSearch(this.value)"></div>
  <div class="bc">7 módulos · 100+ conceitos</div>
</header>
<div class="layout">
<nav class="sidebar" id="sidebar">
  <div style="padding:0 10px 14px">
    <div class="sl">Módulos</div>
    <button class="nb active" onclick="goSec('ppcp')" id="nav-ppcp"><span class="nd" style="background:#4f9eff"></span>PPCP</button>
    <button class="nb" onclick="goSec('pdca')" id="nav-pdca"><span class="nd" style="background:#3ecf8e"></span>PDCA</button>
    <button class="nb" onclick="goSec('demanda')" id="nav-demanda"><span class="nd" style="background:#f5a623"></span>Previsão de demanda</button>
    <button class="nb" onclick="goSec('controle')" id="nav-controle"><span class="nd" style="background:#9b8cff"></span>Controle da demanda</button>
    <button class="nb" onclick="goSec('kpis')" id="nav-kpis"><span class="nd" style="background:#ff6b6b"></span>KPIs</button>
    <button class="nb" onclick="goSec('ml')" id="nav-ml"><span class="nd" style="background:#7c6fff"></span>Machine Learning</button>
    <button class="nb" onclick="goSec('logistica')" id="nav-logistica"><span class="nd" style="background:#00b4a0"></span>Logística</button>
  </div>
</nav>
<main class="main" id="mc"></main>
</div>
<script>
// ── BANCO DE CONCEITOS ÚNICO ─────────────────────────────────────────────────
// Cada conceito vive aqui UMA VEZ. xref aponta para outros módulos onde é mencionado.
const DB = {

// ── PPCP ────────────────────────────────────────────────────────────────────

  detail:['Explode a demanda independente em necessidades dependentes (componentes)','Considera lead times, estoques disponíveis e ordens em aberto','Gera ordens de produção e ordens de compra planejadas','Base para o APS (Advanced Planning & Scheduling) em sistemas modernos','Saída: plano de necessidades de materiais com datas e quantidades'],

// ── SECTIONS CONFIG ──────────────────────────────────────────────────────────
const SECS = {
  ppcp:     {tag:'Planejamento · Programação · Controle', title:'PPCP', desc:'Integra as três grandes fases da gestão de produção: planejar o que produzir, acompanhar o andamento e controlar os desvios.', color:'#4f9eff',
    groups:['Programação','Acompanhamento','Controle']},
  pdca:     {tag:'Melhoria contínua', title:'Ciclo PDCA', desc:'Método universal de melhoria contínua — a cada volta do ciclo o patamar de qualidade sobe.', color:'#3ecf8e',
    groups:['Ciclo PDCA','Ferramentas']},
  demanda:  {tag:'Previsão · Métodos · Erros', title:'Previsão de Demanda', desc:'Base de todo planejamento de produção e estoques. Estima a demanda futura e mede a acurácia da previsão.', color:'#f5a623',

  kpis:     {tag:'Demanda · Produção · Estoque · Qualidade · Financeiro', title:'KPIs — Indicadores de Desempenho', desc:'Os principais indicadores para medir e gerenciar a performance. Use de 5 a 8 KPIs por área.', color:'#ff6b6b',

    groups:['Tipos de ML','Algoritmos','Aplicações','Pipeline de ML']},

    groups:[]},
};

// ── TABELA PERIÓDICA CONFIG ──────────────────────────────────────────────────
const PT_GRID = [
  ['lt','sc_log','cd_log','sku_log','fifo_log',null,'tms','jit'],
  ['sla_log','frt_log',null,'wms','pick_log','loc_log',null,'vmi'],  // nota: row2 col3=DOC→erp_log aproximado
  [null,'erp_log','edi','mps_log','kpi_log','otif_log','cp_log',null],
];
// corrigir: row2 col3 = doc (documentação) — não temos separado, usamos frt_log no lugar certo
// layout exato conforme imagem:
const PT_LAYOUT = [
  ['lt','sc_log','cd_log','sku_log','fifo_log','fifo_log','tms','jit'],
  ['sla_log','frt_log','erp_log','wms','pick_log','loc_log',null,'vmi'],
  [null,'erp_log','edi','mps_log','kpi_log','otif_log','cp_log',null],
];
// Usar layout correto igual à imagem
const PT_ROWS = [
  ['lt','sc_log','cd_log','sku_log','fifo_log',null,'tms','jit'],
  ['sla_log','frt_log',null,'wms','pick_log','loc_log',null,'vmi'],
  [null,'erp_log','edi','mps_log','kpi_log','otif_log','cp_log',null],
];
// Redefine com LIFO separado — usar fifo_log para ambos ou criar alias
// Simplificar: usar o layout real
const PTROWS = [
  ['lt','sc_log','cd_log','sku_log','fifo_log',null,'tms','jit'],
  ['sla_log','frt_log',null,'wms','pick_log','loc_log',null,'vmi'],
  [null,'erp_log','edi','mps_log','kpi_log','otif_log','cp_log',null],
];

const GRP_COLORS = {
  'G1 Tempo':'#6c3fc5','G2 Suprimentos':'#2563a8','G3 Armazenagem':'#1a7a4a',
  'G4 Transporte':'#c45c1a','G5 Sistemas':'#b02080','G6 Planejamento':'#b5891a','G7 Desempenho':'#1a8a8a'
};

// ── SEARCH INDEX ─────────────────────────────────────────────────────────────
const IDX = Object.values(DB).map(c => ({
  id:c.id, sec:c.sec, secTitle: SECS[c.sec]?.title||c.sec, grp:c.grp,
  name:c.name, sub:c.sub, preview:c.preview,
  text:(c.name+' '+c.sub+' '+c.preview+' '+(c.detail||[]).join(' ')+' '+(c.tags||[]).join(' ')).toLowerCase()
}));

// ── STATE ────────────────────────────────────────────────────────────────────
let curSec = 'ppcp', openCards = new Set(), selEl = null, srch = '';

// ── UTILS ────────────────────────────────────────────────────────────────────
function hl(t,q){if(!q)return t;return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>')}
function icon(c){return c.icon||'◆'}
function grpColor(g){return GRP_COLORS[g]||'#4f9eff'}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const m = document.getElementById('mc');
  if(srch.length>1){renderSearch(m);return;}
  if(curSec==='logistica'){renderPeriodic(m);return;}
  renderSection(m);
}

function renderSection(m){
  const sec = SECS[curSec];
  const items = Object.values(DB).filter(c=>c.sec===curSec);
  const byGrp = {};
  items.forEach(c=>{if(!byGrp[c.grp])byGrp[c.grp]=[];byGrp[c.grp].push(c);});
  let h=`<div class="sh"><div class="st">${sec.tag}</div><div class="stt">${sec.title}</div><div class="sd">${sec.desc}</div></div>`;
  sec.groups.forEach(g=>{
    const grpItems = byGrp[g]||[];
    if(!grpItems.length)return;
    h+=`<div style="margin-bottom:24px"><div class="gl"><span class="gd" style="background:${sec.color}"></span>${g}</div><div class="cg">`;
    grpItems.forEach(c=>{
      const open=openCards.has(c.id);
      const dl=c.detail?`<ul class="dl">${c.detail.map(d=>`<li>${d}</li>`).join('')}</ul>`:'';
      const fm=c.formula?`<div class="fml">${c.formula}</div>`:'';
      const tg=c.tags?`<div class="tags" onclick="event.stopPropagation()">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:'';
      const xr=c.xref&&c.xref.length?`<div class="xref" onclick="event.stopPropagation()">${c.xref.map(x=>`<button class="xref-btn" onclick="goItem('${x.sec}','${x.id}')">↗ ${x.label}</button>`).join('')}</div>`:'';
      h+=`<div class="card" id="card-${c.id}" onclick="togCard('${c.id}',event)">
        <div class="ct">
          <div class="ci" style="background:${c.color}18;color:${c.color}">${icon(c)}</div>
          <div class="cm"><div class="cn">${c.name}</div><div class="cs">${c.sub}</div></div>
          <div class="ca" id="arr-${c.id}" style="${open?'transform:rotate(180deg)':''}">▼</div>
        </div>
        <div class="cp">${c.preview}</div>
        <div class="ce ${open?'open':''}">${dl}${fm}${tg}${xr}</div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  m.innerHTML=h;
}

function renderPeriodic(m){
  const sec=SECS.logistica;
  const legend=Object.entries(GRP_COLORS).map(([g,col])=>`<div class="pli"><div class="pld" style="background:${col}"></div><span>${g}</span></div>`).join('');
  let cells='';
  PTROWS.forEach(row=>{
    row.forEach(id=>{
      if(!id){cells+=`<div class="pc pe"></div>`;return;}
      const c=DB[id];
      if(!c){cells+=`<div class="pc pe"></div>`;return;}
      const col=c.color||'#00b4a0';
      cells+=`<div class="pc" id="ptc-${id}" style="background:${col};color:#fff" onclick="selPt('${id}')">
        <div class="pn">${Object.keys(DB).indexOf(id)+1}</div>
        <div class="ps">${c.id.includes('_log')?c.name.split('—')[0].split(' ')[0]:c.name.split('—')[0].split(' ')[0]}</div>
        <div class="pm">${c.sub}</div>
      </div>`;
    });
  });
  m.innerHTML=`<div class="sh"><div class="st">${sec.tag}</div><div class="stt">${sec.title}</div><div class="sd">${sec.desc}</div></div>
    <div class="ptleg">${legend}</div>
    <div class="pthint">▼ Toque em um elemento para ver os detalhes</div>
    <div class="pw"><div class="pt">${cells}</div></div>
    <div id="ptdet"></div>`;
}

function selPt(id){
  const c=DB[id];if(!c)return;
  document.querySelectorAll('.pc').forEach(el=>el.classList.remove('sel'));
  if(selEl===id){selEl=null;document.getElementById('ptdet').innerHTML='';return;}
  selEl=id;
  document.getElementById('ptc-'+id)?.classList.add('sel');
  const col=c.color||'#00b4a0';
  const dl=c.detail?`<ul class="dl">${c.detail.map(d=>`<li>${d}</li>`).join('')}</ul>`:'';
  const xr=c.xref&&c.xref.length?`<div class="xref">${c.xref.map(x=>`<button class="xref-btn" onclick="goItem('${x.sec}','${x.id}')">↗ ${x.label}</button>`).join('')}</div>`:'';
  document.getElementById('ptdet').innerHTML=`<div class="ptd">
    <div class="ptd-top">
      <div class="ptd-badge" style="background:${col}">${c.icon||'◆'}</div>
      <div><div class="ptd-num">${c.grp}</div><div class="ptd-name">${c.name}</div><div class="ptd-grp">${c.sub}</div></div>
    </div>${dl}${xr}</div>`;
  document.getElementById('ptdet').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderSearch(m){
  const q=srch.toLowerCase();
  const res=IDX.filter(x=>x.text.includes(q));
  let h=`<div class="sh"><div class="st">Busca</div><div class="stt">${res.length} resultado${res.length!==1?'s':''} para "${srch}"</div></div>`;
  if(!res.length){h+=`<div class="sr"><div class="ne">Nenhum resultado. Tente: OEE, MAPE, S&OP, WMS, PDCA…</div></div>`;}
  else{
    h+=`<div class="sr">`;
    res.forEach(r=>{
      h+=`<div class="ri" onclick="goItem('${r.sec}','${r.id}')">
        <div class="rn">${hl(r.name,srch)}</div>
        <div class="rp">${SECS[r.sec]?.title||r.sec} › ${r.grp}</div>
        <div class="rs">${hl(r.preview,srch)}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  m.innerHTML=h;
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function goSec(sec){
  curSec=sec;srch='';openCards.clear();selEl=null;
  document.getElementById('sinput').value='';
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+sec)?.classList.add('active');
  closeSb();render();window.scrollTo(0,0);
}

function goItem(sec,id){
  goSec(sec);
  setTimeout(()=>{
    if(sec==='logistica'){selPt(id);return;}
    if(!openCards.has(id))togCard(id,null);
    const el=document.getElementById('card-'+id);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },80);
}

function togCard(id,ev){
  if(ev)ev.stopPropagation();
  if(openCards.has(id))openCards.delete(id);else openCards.add(id);
  const card=document.getElementById('card-'+id);
  const exp=card?.querySelector('.ce');
  const arr=document.getElementById('arr-'+id);
  const open=openCards.has(id);
  card?.classList.toggle('expanded',open);
  if(exp)exp.classList.toggle('open',open);
  if(arr)arr.style.transform=open?'rotate(180deg)':'';
}

function doSearch(v){srch=v.trim();openCards.clear();render();}
function togSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sob').classList.toggle('open')}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sob').classList.remove('open')}

// ── INIT ─────────────────────────────────────────────────────────────────────
// Gerar siglas corretas na tabela periódica
function getSig(id){
  const sigs={'lt':'LT','sc_log':'SC','cd_log':'CD','sku_log':'SKU','fifo_log':'FIFO','tms':'TMS','jit':'JIT',
    'sla_log':'SLA','frt_log':'FRT','wms':'WMS','pick_log':'PICK','loc_log':'LOC','vmi':'VMI',
    'erp_log':'ERP','edi':'EDI','mps_log':'MPS','kpi_log':'KPI','otif_log':'OTIF','cp_log':'CP'};
  return sigs[id]||id.toUpperCase();
}

// Rerender periodic com siglas corretas
const origRenderPeriodic=renderPeriodic;
function renderPeriodic(m){
  const sec=SECS.logistica;
  const legend=Object.entries(GRP_COLORS).map(([g,col])=>`<div class="pli"><div class="pld" style="background:${col}"></div><span>${g}</span></div>`).join('');
  let cells='';
  PTROWS.forEach(row=>{
    row.forEach(id=>{
      if(!id){cells+=`<div class="pc pe"></div>`;return;}
      const c=DB[id];
      if(!c){cells+=`<div class="pc pe"></div>`;return;}
      const col=c.color||'#00b4a0';
      const sig=getSig(id);
      cells+=`<div class="pc" id="ptc-${id}" style="background:${col};color:#fff" onclick="selPt('${id}')">
        <div class="ps">${sig}</div>
        <div class="pm">${c.name.replace(/^[A-Z]+\s*[—-]\s*/,'').substring(0,22)}</div>
        <div class="pd">${c.sub.substring(0,30)}</div>
      </div>`;
    });
  });
  m.innerHTML=`<div class="sh"><div class="st">${sec.tag}</div><div class="stt">${sec.title}</div><div class="sd">${sec.desc}</div></div>
    <div class="ptleg">${legend}</div>
    <div class="pthint">▼ Toque em um elemento para ver os detalhes</div>
    <div class="pw"><div class="pt">${cells}</div></div>
    <div id="ptdet"></div>`;
}

render();
</script>
