<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROD·GUIDE</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#161921;--bg3:#1e2230;
  --border:rgba(255,255,255,.09);--border2:rgba(255,255,255,.18);
  --text:#e8eaf0;--muted:#7a8099;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:10px;height:54px;position:sticky;top:0;z-index:200;flex-wrap:wrap}
.logo{font-family:var(--mono);font-size:13px;font-weight:500;color:#4f9eff;letter-spacing:.06em;white-space:nowrap}
.sw{flex:1;max-width:360px;position:relative;min-width:120px}
.sw input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:6px 12px 6px 32px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .2s}
.sw input:focus{border-color:#4f9eff}
.sw input::placeholder{color:var(--muted)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.nav-tabs{display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-left:auto}
.nav-tab{font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap}
.nav-tab:hover{background:var(--bg3);color:var(--text)}
.nav-tab.active{border-color:var(--border2);color:var(--text);background:var(--bg3)}
.back-tab{font-size:12px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--sans);transition:all .15s;display:none}
.back-tab:hover{color:var(--text)}
.back-tab.show{display:block}

/* VIEWS */
.view{display:none;padding:24px 20px 60px;max-width:1000px;margin:0 auto}
.view.active{display:block}

/* ── HOME — TABELA PERIÓDICA PRINCIPAL ── */
.home-title{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;text-align:center}
.home-main-title{font-size:26px;font-weight:700;color:var(--text);text-align:center;margin-bottom:4px}
.home-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.home-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.hleg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.hleg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* TABELA PERIÓDICA HOME */
.pt-home{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;width:100%}
.ptc{border-radius:12px;padding:14px 10px 10px;cursor:pointer;transition:transform .18s,box-shadow .18s;border:2px solid transparent;position:relative;min-height:120px;display:flex;flex-direction:column}
.ptc:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.5)}
.ptc:active{transform:scale(.96)}
.ptc.sel{border-color:rgba(255,255,255,.6);box-shadow:0 0 0 3px rgba(255,255,255,.15)}
.ptc-empty{background:transparent!important;cursor:default;min-height:120px}
.ptc-empty:hover{transform:none;box-shadow:none}
.pt-num{font-family:var(--mono);font-size:10px;font-weight:500;color:rgba(255,255,255,.55);margin-bottom:6px}
.pt-sig{font-size:26px;font-weight:700;color:#fff;line-height:1;margin-bottom:5px}
.pt-name{font-size:9.5px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:3px;flex:1}
.pt-desc{font-size:8px;color:rgba(255,255,255,.6);line-height:1.3}

/* DETAIL PANEL (home) */
.pt-detail{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-top:20px;animation:fi .22s ease}
.ptd-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.ptd-badge{width:54px;height:54px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.ptd-grp{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:2px}
.ptd-name{font-size:17px;font-weight:600;color:var(--text);margin-bottom:2px}
.ptd-sub{font-size:12px;color:var(--muted)}
.ptd-hint{font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px;opacity:.5}

/* SECTION VIEW */
.sv-hdr{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.sv-badge{width:48px;height:48px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sv-tag{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.07em;margin-bottom:2px}
.sv-title{font-size:20px;font-weight:600;color:var(--text)}
.grp-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.grp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px;margin-bottom:24px}

/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;cursor:pointer;transition:all .2s}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.ct{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.ci{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cm{flex:1}
.cn{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1px}
.cs{font-size:11px;color:var(--muted)}
.ca{color:var(--muted);font-size:11px;transition:transform .22s;flex-shrink:0;margin-left:auto;padding-left:6px;margin-top:2px}
.cprev{font-size:13px;color:var(--muted);line-height:1.6}
.ce{margin-top:11px;border-top:1px solid var(--border);padding-top:11px;display:none;animation:fi .2s ease}
.ce.open{display:block}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.dl{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.dl li{font-size:13px;color:var(--muted);display:flex;gap:7px;line-height:1.5}
.dl li::before{content:'›';color:#4f9eff;flex-shrink:0;font-weight:600}
.fml{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-family:var(--mono);font-size:12px;color:#3ecf8e;margin:10px 0}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tag{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);color:var(--muted)}
.xref{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.xb{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid #4f9eff;color:#4f9eff;background:transparent;cursor:pointer;font-family:var(--sans);transition:background .15s}
.xb:hover{background:rgba(79,158,255,.1)}

/* SEARCH */
.sr-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-top:16px}
.ri{padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer}
.ri:last-child{border-bottom:none}
.ri:hover .rn{color:#4f9eff}
.rn{font-size:13px;font-weight:500;color:var(--text);transition:color .15s}
.rp{font-family:var(--mono);font-size:11px;color:var(--muted)}
.rs{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.ne{text-align:center;color:var(--muted);padding:20px 0;font-size:14px}
mark{background:rgba(79,158,255,.22);color:#4f9eff;border-radius:2px;padding:0 2px}

/* MOBILE */
@media(max-width:680px){
  .view{padding:16px 12px 60px}
  .pt-home{grid-template-columns:repeat(3,1fr);gap:8px}
  .ptc{min-height:100px;padding:10px 8px 8px;border-radius:10px}
  .pt-sig{font-size:22px}
  .pt-name{font-size:9px}
  .pt-desc{font-size:8px;opacity:.6}
  .nav-tabs{gap:3px}
  .nav-tab{font-size:11px;padding:4px 8px}
  .cg{grid-template-columns:1fr}
  .ptc-empty{display:none}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">PROD·GUIDE</div>
  <div class="sw"><span class="si">🔍</span>
    <input type="text" id="sinput" placeholder="Buscar: OEE, WMS, PDCA…" oninput="doSearch(this.value)">
  </div>
  <div class="nav-tabs" id="nav-tabs">
    <button class="nav-tab active" onclick="goHome()" id="tab-home">🏠 Início</button>
    <button class="nav-tab" onclick="goSec('ppcp')" id="tab-ppcp">PPCP</button>
    <button class="nav-tab" onclick="goSec('pdca')" id="tab-pdca">PDCA</button>
    <button class="nav-tab" onclick="goSec('demanda')" id="tab-demanda">Demanda</button>
    <button class="nav-tab" onclick="goSec('controle')" id="tab-controle">S&OP</button>
    <button class="nav-tab" onclick="goSec('kpis')" id="tab-kpis">KPIs</button>
    <button class="nav-tab" onclick="goSec('ml')" id="tab-ml">ML</button>
  </div>
</header>

<div class="view active" id="view-home"></div>
<div class="view" id="view-sec"></div>
<div class="view" id="view-search"></div>

<script>

const GRP_COLORS={'G1 Tempo':'#6c3fc5','G2 Suprimentos':'#2563a8','G3 Armazenagem e Estoque':'#1a7a4a','G4 Transporte e Distribuição':'#c45c1a','G5 Sistemas e Tecnologia':'#b02080','G6 Planejamento e Controle':'#b5891a','G7 Desempenho e Padrão':'#1a8a8a'};

const DB={

'mrp':{id:'mrp',sec:'ppcp',grp:'Programação',icon:'🗂',color:'#1e4fa8',name:'MRP / Planejamento',sub:'Materials Requirement Planning',preview:'Calcula necessidades de materiais, capacidade e prazo com base na demanda prevista.',detail:['Explode a demanda independente em necessidades dependentes (componentes)','Considera lead times, estoques disponíveis e ordens em aberto','Gera ordens de produção e ordens de compra planejadas','Base para o APS em sistemas modernos'],tags:['BOM','Lead time'],xref:[{sec:'logistica',id:'mps_log',label:'MPS → Logística'}]},

    <div class="home-main-title">PROD·GUIDE</div>
    <div class="home-sub">Toque em um elemento para ver os detalhes · Use o menu acima para acessar os outros módulos</div>
    <div class="home-legend">${legend}</div>
    <div class="pt-home">${cells}</div>
    <div id="pt-det"></div>`;
}

function selPt(id){
  const c=DB[id];if(!c)return;
  document.querySelectorAll('.ptc').forEach(e=>e.classList.remove('sel'));
  if(selEl===id){selEl=null;document.getElementById('pt-det').innerHTML='';return;}
  selEl=id;
  document.getElementById('ptc-'+id)?.classList.add('sel');
  const dl=c.detail?`<ul class="dl">${c.detail.map(d=>`<li>${d}</li>`).join('')}</ul>`:'';
  const tg=c.tags?`<div class="tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:'';
  const xr=c.xref&&c.xref.length?`<div class="xref">${c.xref.map(x=>`<button class="xb" onclick="goItem('${x.sec}','${x.id}')">↗ ${x.label}</button>`).join('')}</div>`:'';
  const det=document.getElementById('pt-det');
  det.innerHTML=`<div class="pt-detail">
    <div class="ptd-top">
      <div class="ptd-badge" style="background:${c.color}">${c.icon||c.sig||'◆'}</div>
      <div>
        <div class="ptd-grp">${c.grp} · Elemento ${PT_NUMS[id]||''}</div>
        <div class="ptd-name">${c.sig} — ${c.name}</div>
        <div class="ptd-sub">${c.sub}</div>
      </div>
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">${c.preview}</p>
    ${dl}${tg}${xr}
  </div>`;
  det.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── RENDER SECTION ──────────────────────────────────────────────
function renderSection(){
  show('view-sec');
  const v=document.getElementById('view-sec');
  const mod=MODS[curSec];
  const items=Object.values(DB).filter(c=>c.sec===curSec);
  const byGrp={};items.forEach(c=>{if(!byGrp[c.grp])byGrp[c.grp]=[];byGrp[c.grp].push(c);});
  let h=`<div class="sv-hdr">
    <div class="sv-badge" style="background:${mod.color}">${mod.icon}</div>
    <div><div class="sv-tag">${mod.sub}</div><div class="sv-title">${mod.name}</div></div>
  </div>`;
  (SEC_GROUPS[curSec]||[]).forEach(g=>{
    const gi=byGrp[g]||[];if(!gi.length)return;
    h+=`<div style="margin-bottom:22px"><div class="grp-lbl"><span class="grp-dot" style="background:${mod.color}"></span>${g}</div><div class="cg">`;
    gi.forEach(c=>{
      const open=openCards.has(c.id);
      const dl=c.detail?`<ul class="dl">${c.detail.map(d=>`<li>${d}</li>`).join('')}</ul>`:'';
      const fm=c.formula?`<div class="fml">${c.formula}</div>`:'';
      const tg=c.tags?`<div class="tags" onclick="event.stopPropagation()">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:'';
      const xr=c.xref&&c.xref.length?`<div class="xref" onclick="event.stopPropagation()">${c.xref.map(x=>`<button class="xb" onclick="goItem('${x.sec}','${x.id}')">↗ ${x.label}</button>`).join('')}</div>`:'';
      h+=`<div class="card" id="card-${c.id}" onclick="togCard('${c.id}',event)">
        <div class="ct">
          <div class="ci" style="background:${c.color}22;color:${c.color}">${c.icon||'◆'}</div>
          <div class="cm"><div class="cn">${c.name}</div><div class="cs">${c.sub}</div></div>
          <div class="ca" id="arr-${c.id}" style="${open?'transform:rotate(180deg)':''}">▼</div>
        </div>
        <div class="cprev">${c.preview}</div>
        <div class="ce ${open?'open':''}">${dl}${fm}${tg}${xr}</div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  v.innerHTML=h;
}

// ── RENDER SEARCH ───────────────────────────────────────────────
function renderSearch(){
  show('view-search');
  const v=document.getElementById('view-search');
  const q=srch.toLowerCase();
  const res=IDX.filter(x=>x.text.includes(q));
  const hl=t=>t.replace(new RegExp('('+srch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
  const modName=id=>({ppcp:'PPCP',pdca:'PDCA',demanda:'Previsão de demanda',controle:'Controle da demanda',kpis:'KPIs',ml:'Machine Learning',logistica:'Logística'}[id]||id);
  let h=`<div class="sv-hdr"><div class="sv-meta"><div class="sv-tag">Busca</div><div class="sv-title">${res.length} resultado${res.length!==1?'s':''} para "${srch}"</div></div></div>`;
  if(!res.length){h+=`<div class="sr-box"><div class="ne">Nenhum resultado. Tente: OEE, MAPE, S&OP, WMS, PDCA…</div></div>`;}
  else{
    h+=`<div class="sr-box">`;
    res.forEach(r=>{h+=`<div class="ri" onclick="goItem('${r.sec}','${r.id}')"><div class="rn">${hl(r.name)}</div><div class="rp">${modName(r.sec)} › ${r.grp}</div><div class="rs">${hl(r.preview)}</div></div>`;});
    h+=`</div>`;
  }
  v.innerHTML=h;
}

// ── ACTIONS ─────────────────────────────────────────────────────
function show(id){
  ['view-home','view-sec','view-search'].forEach(v=>{
    document.getElementById(v).classList.toggle('active',v===id);
  });
}
function setActive(tabId){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(tabId)?.classList.add('active');
}
function goHome(){
  curSec=null;srch='';openCards.clear();selEl=null;
  document.getElementById('sinput').value='';
  setActive('tab-home');renderHome();window.scrollTo(0,0);
}
function goSec(sec){
  curSec=sec;srch='';openCards.clear();selEl=null;
  document.getElementById('sinput').value='';
  setActive('tab-'+sec);renderSection();window.scrollTo(0,0);
}
function goItem(sec,id){
  if(sec==='logistica'){goHome();setTimeout(()=>selPt(id),80);return;}
  goSec(sec);
  setTimeout(()=>{
    openCards.add(id);
    const card=document.getElementById('card-'+id);
    if(card){
      card.querySelector('.ce')?.classList.add('open');
      const arr=document.getElementById('arr-'+id);
      if(arr)arr.style.transform='rotate(180deg)';
      card.scrollIntoView({behavior:'smooth',block:'center'});
    }
  },100);
}
function togCard(id,ev){
  if(ev)ev.stopPropagation();
  if(openCards.has(id))openCards.delete(id);else openCards.add(id);
  const card=document.getElementById('card-'+id);
  const open=openCards.has(id);
  card?.querySelector('.ce')?.classList.toggle('open',open);
  const arr=document.getElementById('arr-'+id);
  if(arr)arr.style.transform=open?'rotate(180deg)':'';
}
function doSearch(v){
  srch=v.trim();
  if(!srch){if(curSec)renderSection();else renderHome();return;}
  setActive('');renderSearch();
}

renderHome();
</script>
</body>
</html>
